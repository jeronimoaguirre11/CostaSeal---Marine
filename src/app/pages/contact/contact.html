<section class="contact-hero">
  <p class="page-eyebrow">Get in Touch</p>
  <h1>Tell us what your vessel needs.</h1>
</section>

<section class="contact-body">
  <div class="contact-form-wrap">
    <h3>Request a Free Quote</h3>
    <p class="form-intro">Fill out the form and we'll get back to you shortly.</p>

    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
      <input type="hidden" name="access_key" value="84e49012-4451-436b-8aca-aa34ea17382c" />
      <input type="hidden" name="subject" value="New Quote Request - Costaseal Marine" />

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            minlength="2"
            placeholder="Jane Smith"
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="jane@email.com" />
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          required
          pattern="[0-9\s\+\-]{8,15}"
          placeholder="0400 000 000"
        />
      </div>

      <div class="form-group">
        <label for="message">Tell us about your vessel</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          required
          minlength="10"
          placeholder="Describe your vessel and what needs attention..."
        ></textarea>
      </div>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>

    <div class="contact-alt">
      <p>Prefer send a text message?</p>
      <a href="sms:+61416685034" target="_blank" class="whatsapp-link">Chat with us directly</a>
    </div>
  </div>

  <div class="contact-image">
    <img src="/FONDO_C1.webp" alt="Laura, Costaseal Marine" />
  </div>
</section>
