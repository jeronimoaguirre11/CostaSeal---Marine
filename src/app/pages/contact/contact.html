<section class="contact-hero">
  <p class="page-eyebrow">Get in Touch</p>
  <h1>Tell us what your vessel needs.</h1>
</section>

<section class="contact-body">
  <div class="contact-form-wrap">
    <h3>Request a Free Quote</h3>
    <p class="form-intro">Fill out the form and we'll get back to you shortly.</p>

    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
      <input type="hidden" name="access_key" value="TU_ACCESS_KEY_AQUI" />
      <input type="hidden" name="subject" value="New Quote Request - Costaseal Marine" />

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" name="phone" />
      </div>

      <div class="form-group">
        <label for="message">Tell us about your vessel</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>

    <div class="contact-alt">
      <p>Prefer WhatsApp?</p>
      <a href="https://wa.me/61416685034" target="_blank" class="whatsapp-link"
        >Chat with us directly</a
      >
    </div>
  </div>

  <div class="contact-image">
    <img src="/FONDO_C1.webp" alt="Laura, Costaseal Marine" />
  </div>
</section>
